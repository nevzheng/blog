<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Axiomatic Turtle - Minimal Geometric (logo-style) -->
  
  <!-- Shell - clean hexagonal dome -->
  <path d="M256 100 L370 180 L390 310 L320 400 L192 400 L122 310 L142 180 Z" 
        fill="#2D6A4F" stroke="#1B4332" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Inner shell pattern - concentric hexagon -->
  <path d="M256 155 L330 210 L345 295 L300 355 L212 355 L167 295 L182 210 Z" 
        fill="#40916C" stroke="#1B4332" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Center hexagon -->
  <path d="M256 205 L295 235 L305 285 L280 315 L232 315 L207 285 L217 235 Z" 
        fill="#74C69D" stroke="#1B4332" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="265" r="15" fill="#B7E4C7" stroke="#1B4332" stroke-width="3"/>
  
  <!-- Head - simple circle poking out -->
  <circle cx="256" cy="85" r="35" fill="#95D5B2" stroke="#1B4332" stroke-width="5"/>
  
  <!-- Eyes - dots -->
  <circle cx="244" cy="80" r="6" fill="#1B4332"/>
  <circle cx="268" cy="80" r="6" fill="#1B4332"/>
  
  <!-- Legs - simple rounded stubs -->
  <circle cx="125" cy="195" r="22" fill="#95D5B2" stroke="#1B4332" stroke-width="4"/>
  <circle cx="387" cy="195" r="22" fill="#95D5B2" stroke="#1B4332" stroke-width="4"/>
  <circle cx="135" cy="375" r="22" fill="#95D5B2" stroke="#1B4332" stroke-width="4"/>
  <circle cx="377" cy="375" r="22" fill="#95D5B2" stroke="#1B4332" stroke-width="4"/>
  
  <!-- Tail -->
  <circle cx="256" cy="425" r="14" fill="#95D5B2" stroke="#1B4332" stroke-width="4"/>
</svg>
